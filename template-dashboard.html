<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cartographie Interactive</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --color-opposed: #ef4444;
            --color-opposed-light: #fee2e2;
            --color-favorable: #22c55e;
            --color-favorable-light: #dcfce7;
            --color-neutral: #f59e0b;
            --color-neutral-light: #fef3c7;
            --primary: #3b82f6;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-primary); color: var(--text-main); line-height: 1.5; padding: 2rem; }
        header { margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; }
        header h1 { font-size: 2.25rem; font-weight: 800; color: #0f172a; letter-spacing: -0.025em; margin-bottom: 0.5rem; }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        .tab-btn { background: none; border: none; font-size: 1rem; font-weight: 600; color: var(--text-muted); padding: 0.5rem 1rem; cursor: pointer; border-radius: var(--radius); transition: var(--transition); }
        .tab-btn:hover { background-color: var(--border-color); color: var(--text-main); }
        .tab-btn.active { background-color: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; align-items: start; }
        @media (max-width: 968px) { .dashboard-layout { grid-template-columns: 1fr; } }

        .filters-sidebar { background-color: var(--bg-card); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); position: sticky; top: 2rem; }
        .filter-section { margin-bottom: 1.5rem; }
        .filter-section h3 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.75rem; }
        .filter-options { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.6rem 0.8rem; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; text-align: left; font-size: 0.9rem; font-weight: 500; color: var(--text-main); cursor: pointer; transition: var(--transition); }
        .filter-btn:hover, .filter-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .filter-btn .count { font-size: 0.75rem; background-color: rgba(0, 0, 0, 0.05); padding: 0.1rem 0.4rem; border-radius: 10px; }
        .filter-btn.active .count { background-color: rgba(255, 255, 255, 0.2); }

        .actors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .actor-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
        .actor-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .actor-card::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; }
        .actor-card.opposed::before { background-color: var(--color-opposed); }
        .actor-card.favorable::before { background-color: var(--color-favorable); }
        .actor-card.neutral::before { background-color: var(--color-neutral); }
        
        .actor-header { margin-bottom: 1rem; }
        .actor-name { font-size: 1.2rem; font-weight: 700; color: #0f172a; margin-bottom: 0.25rem; }
        .actor-role { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; }
        .actor-body { font-size: 0.95rem; color: var(--text-main); margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .actor-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 0.75rem; font-size: 0.8rem; }
        
        .badge { padding: 0.25rem 0.6rem; border-radius: 20px; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.025em; }
        .badge.opposed { background-color: var(--color-opposed-light); color: var(--color-opposed); }
        .badge.favorable { background-color: var(--color-favorable-light); color: var(--color-favorable); }
        .badge.neutral { background-color: var(--color-neutral-light); color: var(--color-neutral); }
        .certitude { color: var(--text-muted); font-style: italic; }

        .griefs-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 2rem; }
        @media (max-width: 640px) { .griefs-container { grid-template-columns: 1fr; } }
        .grief-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
        .grief-card h2 { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 1rem; }

        .list-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); margin-bottom: 2rem; }
        .list-card h2 { margin-bottom: 1rem; font-size: 1.4rem; }
        .list-card ul { padding-left: 1.5rem; }
        .list-card li { margin-bottom: 0.75rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background-color: var(--bg-card); border-radius: var(--radius); max-width: 600px; width: 100%; padding: 2rem; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
        .modal-field { margin-bottom: 1.25rem; }
        .modal-field label { display: block; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 0.25rem; }
        .modal-verbatim { background-color: var(--bg-primary); padding: 1rem; border-left: 4px solid var(--primary); border-radius: 4px; font-style: italic; }
    </style>
    
    <script src="data-projet.js"></script>
</head>
<body>

    <header>
        <h1 id="proj-title">Chargement...</h1>
        <p id="proj-subtitle"></p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('carto', this)">Cartographie des Acteurs</button>
        <button class="tab-btn" onclick="switchTab('griefs', this)">Synthèse des Griefs</button>
        <button class="tab-btn" onclick="switchTab('vigilance', this)">Points de Vigilance &amp; Sources</button>
    </nav>

    <div id="tab-carto" class="tab-content active">
        <div class="dashboard-layout">
            <aside class="filters-sidebar">
                <div class="filter-section">
                    <h3>Collèges d'acteurs</h3>
                    <div class="filter-options" id="filter-categories"></div>
                </div>
                <div class="filter-section">
                    <h3>Positionnement</h3>
                    <div class="filter-options" id="filter-stances"></div>
                </div>
            </aside>
            <main class="actors-grid" id="actors-grid"></main>
        </div>
    </div>

    <div id="tab-griefs" class="tab-content">
        <div class="griefs-container" id="griefs-grid"></div>
    </div>

    <div id="tab-vigilance" class="tab-content">
        <div class="list-card">
            <h2>🔍 Points de vigilance majeurs (Limites et incertitudes)</h2>
            <ul id="vigilance-list"></ul>
        </div>
        <div class="list-card">
            <h2>📰 Médias et sources d'investigation répertoriés</h2>
            <ul id="sources-list"></ul>
        </div>
    </div>

    <div class="modal" id="actor-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="toggleModal(false)">×</button>
            <div class="modal-field">
                <label>Nom / Entité</label>
                <h2 id="modal-name" style="font-size:1.6rem; font-weight:700;"></h2>
            </div>
            <div class="modal-field">
                <label>Fonction / Rattachement</label>
                <p id="modal-role"></p>
            </div>
            <div class="modal-field">
                <label>Positionnement ou Argument Principal</label>
                <p id="modal-position"></p>
            </div>
            <div class="modal-field">
                <label>Verbatim / Preuve documentaire</label>
                <p id="modal-verbatim" class="modal-verbatim"></p>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <div class="modal-field" style="margin:0;">
                    <label>Orientation</label>
                    <span id="modal-stance-badge" class="badge"></span>
                </div>
                <div class="modal-field" style="margin:0; text-align: right;">
                    <label>Niveau de certitude</label>
                    <p id="modal-certainty" class="certitude"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentStance = 'all';

        document.addEventListener("DOMContentLoaded", () => {
            // Remplissage des métadonnées
            document.getElementById('proj-title').innerText = projectData.meta.title;
            document.getElementById('proj-subtitle').innerText = projectData.meta.subtitle;
            
            buildFilters();
            renderActors();
            renderGriefs();
            renderLists();
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function buildFilters() {
            const catContainer = document.getElementById('filter-categories');
            const stanceContainer = document.getElementById('filter-stances');

            // Génération Filtres Catégories avec calcul automatique des effectifs
            Object.entries(projectData.taxonomy.categories).forEach(([key, value]) => {
                const count = key === 'all' ? projectData.actors.length : projectData.actors.filter(a => a.category === key).length;
                catContainer.innerHTML += `
                    <button class="filter-btn ${key === 'all' ? 'active' : ''}" onclick="filterCat('${key}', this)">
                        <span>${value}</span> <span class="count">${count}</span>
                    </button>`;
            });

            // Génération Filtres Stances
            Object.entries(projectData.taxonomy.stances).forEach(([key, value]) => {
                const count = key === 'all' ? projectData.actors.length : projectData.actors.filter(a => a.stance === key).length;
                stanceContainer.innerHTML += `
                    <button class="filter-btn ${key === 'all' ? 'active' : ''}" onclick="filterStance('${key}', this)">
                        <span>${value}</span> <span class="count">${count}</span>
                    </button>`;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('#filter-categories .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = cat;
            renderActors();
        }

        function filterStance(stance, btn) {
            document.querySelectorAll('#filter-stances .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStance = stance;
            renderActors();
        }

        function renderActors() {
            const grid = document.getElementById('actors-grid');
            grid.innerHTML = '';

            const filtered = projectData.actors.filter(a => {
                const matchCat = currentCategory === 'all' || a.category === currentCategory;
                const matchStance = currentStance === 'all' || a.stance === currentStance;
                return matchCat && matchStance;
            });

            if (!filtered.length) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);">Aucun acteur ne correspond.</div>';
                return;
            }

            filtered.forEach(a => {
                const card = document.createElement('div');
                card.className = `actor-card ${a.stance}`;
                card.onclick = () => showDetails(a);
                card.innerHTML = `
                    <div class="actor-header">
                        <div class="actor-name">${a.name}</div>
                        <div class="actor-role">${a.role}</div>
                    </div>
                    <div class="actor-body">${a.position}</div>
                    <div class="actor-footer">
                        <span class="badge ${a.stance}">${projectData.taxonomy.stances[a.stance]}</span>
                        <span class="certitude">Certitude : ${a.certainty}</span>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function renderGriefs() {
            const container = document.getElementById('griefs-grid');
            projectData.griefs.forEach(g => {
                container.innerHTML += `
                    <div class="grief-card">
                        <h2>${g.title}</h2>
                        <p>${g.text}</p>
                    </div>`;
            });
        }

        function renderLists() {
            const vigUl = document.getElementById('vigilance-list');
            const srcUl = document.getElementById('sources-list');
            projectData.vigilance.forEach(v => vigUl.innerHTML += `<li>${v}</li>`);
            projectData.sources.forEach(s => srcUl.innerHTML += `<li>${s}</li>`);
        }

        function showDetails(a) {
            document.getElementById('modal-name').innerText = a.name;
            document.getElementById('modal-role').innerText = a.role;
            document.getElementById('modal-position').innerText = a.position;
            document.getElementById('modal-verbatim').innerText = a.evidence;
            document.getElementById('modal-certainty').innerText = a.certainty;
            
            const badge = document.getElementById('modal-stance-badge');
            badge.className = `badge ${a.stance}`;
            badge.innerText = projectData.taxonomy.stances[a.stance];
            
            toggleModal(true);
        }

        function toggleModal(show) {
            document.getElementById('actor-modal').classList.toggle('active', show);
        }

        function closeModal(e) {
            if (e.target.id === 'actor-modal') toggleModal(false);
        }
    </script>
</body>
</html>
